name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: TypeScript check (client)
        run: npm run typecheck:client

      - name: TypeScript check (server)
        run: npm run typecheck:server

      - name: Lint (client)
        run: npm run lint:client

      - name: Lint (server)
        run: npm run lint:server

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
