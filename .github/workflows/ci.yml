name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Typecheck + Lint + Test + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build shared package (other workspaces depend on it)
        run: npm run build:shared

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      # Bundle size 追蹤：記錄每次 build 後的 client chunk 大小
      # 後續可擴充為 PR 自動評論大小差異
      - name: Report bundle sizes
        if: always()
        run: |
          echo "## 📦 Bundle sizes (gzipped estimate via stat)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          cd client/dist/assets
          for f in *.js; do
            size=$(stat -f%z "$f" 2>/dev/null || stat -c%s "$f")
            size_kb=$(echo "scale=1; $size / 1024" | bc)
            gz_size=$(gzip -c "$f" | wc -c)
            gz_kb=$(echo "scale=1; $gz_size / 1024" | bc)
            echo "| \`$f\` | ${size_kb} KB (gzip: ${gz_kb} KB) |" >> $GITHUB_STEP_SUMMARY
          done

      - name: Upload build artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: client-dist-${{ github.sha }}
          path: web/client/dist/
          retention-days: 7

  audit:
    name: npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Audit (moderate+)
        run: npm audit --audit-level=moderate
        continue-on-error: true

  desktop-drift:
    name: PixelAgentsDesktop shared/ drift
    runs-on: ubuntu-latest
    # 允許失敗不阻擋其他 job；drift 只是提醒信號
    continue-on-error: true
    steps:
      - name: Checkout this repo (PixelAgentsWebsite)
        uses: actions/checkout@v6
        with:
          path: web-repo

      # 若 Desktop repo 未公開或尚未建立，clone 會失敗 — 用 continue-on-error 容忍
      - name: Checkout PixelAgentsDesktop (sibling repo)
        id: clone-desktop
        continue-on-error: true
        uses: actions/checkout@v6
        with:
          repository: weimi89/PixelAgentsDesktop
          path: PixelAgentsDesktop

      - name: Setup Node
        if: steps.clone-desktop.outcome == 'success'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run drift check
        if: steps.clone-desktop.outcome == 'success'
        working-directory: web-repo
        env:
          PIXEL_AGENTS_DESKTOP_PATH: ${{ github.workspace }}/PixelAgentsDesktop
        run: node scripts/check-desktop-sync.mjs --required

      - name: Report skipped check
        if: steps.clone-desktop.outcome != 'success'
        run: |
          echo "⏭ Desktop repo not accessible — drift check skipped." >> $GITHUB_STEP_SUMMARY
          echo "If Desktop is private, configure deploy keys or make drift check informational only." >> $GITHUB_STEP_SUMMARY
