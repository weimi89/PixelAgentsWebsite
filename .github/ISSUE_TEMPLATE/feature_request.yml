name: ✨ Feature request
description: 提議新功能或改進現有行為
title: "[feat] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        請先閱讀 [ROADMAP](../blob/main/ROADMAP.md)，確認方向是否已在規劃中。

  - type: textarea
    id: problem
    attributes:
      label: 想解決的問題 / 使用情境
      description: 用你的實際使用場景描述，為什麼需要這個功能？
      placeholder: 我有 10 個代理同時工作，很難一眼看出哪些在等待回應…
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 想像的解決方案
      description: 理想情況下這功能長什麼樣？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案（若有考慮過）
      placeholder: 我試過用 workspace 搜尋但…

  - type: dropdown
    id: scope
    attributes:
      label: 影響範圍
      multiple: true
      options:
        - 前端 UI / UX
        - 遊戲引擎 / 角色行為
        - 伺服器 / API
        - 認證 / 安全
        - 多機器 / 叢集
        - 佈局編輯器
        - 文件 / 開發體驗
        - 其他
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 額外脈絡
      placeholder: 截圖、參考連結、草稿…

  - type: checkboxes
    id: terms
    attributes:
      label: 確認
      options:
        - label: 我已檢查 ROADMAP.md 且此功能未列於「不做的事」
          required: true
        - label: 我已搜尋過沒有重複的 issue
          required: true
